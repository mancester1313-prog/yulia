<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#C9A84C;--gold-l:#F0D080;--gold-p:rgba(201,168,76,0.12);--blue:#2563eb;--blue-l:rgba(37,99,235,0.12);--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#252540;--bg4:#2d2d4e;--txt:#f0f0ff;--txt2:#9090bb;--txt3:#5a5a7a;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.15);--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--r:14px;--rs:10px;--rp:24px}
html,body{height:100%;overflow:hidden;background:#0f0f1a}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;color:var(--txt);font-size:15px}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.hdr{background:linear-gradient(160deg,#0f0f1a,#1a1a3e 60%,#1e2060);padding:16px 16px 0;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1a1a2e}
.hdr-lbl{font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-left:7px}
.hdr-brand{display:flex;align-items:center}
.hdr-act{display:flex;gap:8px}
.hdr-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.hdr-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hdr-name span{color:var(--gold-l)}
.hdr-meta{display:flex;gap:8px;margin-bottom:12px}
.badge{font-size:10px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);padding:3px 10px;border-radius:var(--rp);border:1px solid var(--brd)}
.badge.gold{color:var(--gold);background:var(--gold-p);border-color:rgba(201,168,76,.3)}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab.on{color:var(--gold-l);border-bottom-color:var(--gold)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 100px;background:var(--bg)}
.lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin:16px 0 8px 2px}
.lbl:first-child{margin-top:0}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card-g{border-left:2px solid var(--gold)}
.ex{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px;transition:border-color .3s}
.ex.xdone{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.03)}
.ex-nr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ex-n{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.ex-dl{font-size:11px;font-weight:700;color:var(--green)}
.ex-pl{font-size:11px;font-weight:700;color:var(--amber)}
.ex-ua{font-size:15px;font-weight:700;color:var(--txt);line-height:1.3}
.ex-ru{font-size:11px;color:var(--txt3);margin-top:2px}
.ex-mu{font-size:11px;color:var(--txt2);margin-top:3px}
.ex-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:10px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rp);padding:3px 9px;color:var(--txt2)}
.tag.g{color:var(--gold);background:var(--gold-p);border-color:rgba(201,168,76,.2)}
.tag.rest{color:#22c55e;background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25)}
.yt{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#60a5fa;margin-top:8px;cursor:pointer;background:rgba(37,99,235,.1);padding:5px 12px;border-radius:var(--rp);border:1px solid rgba(37,99,235,.2);text-decoration:none}
.sets-sec{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.sets-lbl{font-size:11px;color:var(--txt3);margin-bottom:8px}
.sets-row{display:flex;gap:8px;flex-wrap:wrap}
.sb{width:44px;height:44px;border-radius:50%;border:2px solid var(--brd2);background:var(--bg3);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);flex-shrink:0;transition:all .15s;-webkit-appearance:none;outline:none}
.sb.done{background:var(--blue);border-color:var(--blue);color:#fff}
.sb.fail{background:rgba(239,68,68,.12);border-color:var(--red);color:var(--red)}
.cr{display:flex;gap:8px;margin-top:12px}
.cb{flex:1;background:var(--bg3);border-radius:var(--rs);padding:10px 12px;border:1px solid var(--brd)}
.cl{font-size:10px;color:var(--txt3);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.ci{display:flex;align-items:center;justify-content:space-between;gap:4px}
.cm{width:32px;height:32px;border-radius:50%;border:1px solid var(--brd2);background:var(--bg4);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt);flex-shrink:0;-webkit-appearance:none;outline:none}
.cv{font-size:17px;font-weight:700;color:var(--txt);text-align:center;flex:1}
.feel-row{display:flex;gap:4px}
.fb{flex:1;padding:10px 2px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);text-align:center;cursor:pointer;transition:all .2s}
.fb.on{border-color:var(--blue);background:rgba(37,99,235,.15)}
.fi{font-size:22px;display:block}
.fl{font-size:9px;color:var(--txt3);margin-top:3px;display:block}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 14px;border-radius:var(--rp);border:1px solid var(--brd2);background:var(--bg3);font-size:13px;cursor:pointer;color:var(--txt2);transition:all .2s}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
textarea{width:100%;border:1px solid var(--brd2);border-radius:var(--rs);padding:12px;font-size:14px;color:var(--txt);background:var(--bg3);resize:none;font-family:inherit;line-height:1.6;outline:none;-webkit-appearance:none}
textarea::placeholder{color:var(--txt3)}
.bnr{display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 0}
.bb{width:48px;height:48px;border-radius:50%;border:1px solid var(--brd2);background:var(--bg3);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt);-webkit-appearance:none;outline:none}
.bv{font-size:40px;font-weight:700;color:var(--txt);min-width:90px;text-align:center}
.bu{font-size:14px;color:var(--txt2);align-self:flex-end;padding-bottom:8px}
.wd{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--brd)}
.wd:last-child{border-bottom:none}
.wi{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.wid{background:rgba(34,197,94,.12)}
.wip{background:rgba(245,158,11,.12)}
.win{background:var(--bg3)}
.wn{flex:1}
.wname{font-size:14px;font-weight:600;color:var(--txt)}
.wsub{font-size:11px;color:var(--txt2);margin-top:2px}
.wpct{font-size:14px;font-weight:700;color:var(--blue)}
.pb{height:3px;background:var(--bg3);border-radius:2px;margin-top:5px}
.pf{height:100%;background:var(--blue);border-radius:2px}
.sl{margin-bottom:14px}
.slh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sln{font-size:14px;color:var(--txt)}
.slv{font-size:20px;font-weight:700;color:var(--gold)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--bg4);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;border:none}
.btn-g{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#1a1a2e;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;-webkit-appearance:none;outline:none}
.btn-b{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;-webkit-appearance:none;outline:none}
.btn-o{width:100%;padding:13px;background:none;color:var(--txt2);border:1px solid var(--brd2);border-radius:var(--r);font-size:14px;cursor:pointer;margin-top:8px;-webkit-appearance:none;outline:none}
.btn-tg{display:flex;align-items:center;justify-content:center;gap:8px;flex:1;padding:14px;background:#229ED9;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;-webkit-appearance:none;outline:none}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;flex:1;padding:14px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;-webkit-appearance:none;outline:none}
.send-r{display:flex;gap:8px;margin-top:10px}
.tov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center}
.tbox{background:var(--bg2);border:1px solid var(--brd2);border-radius:24px;padding:28px 32px;text-align:center;width:290px}
.tlbl{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.tex{font-size:13px;color:var(--txt2);margin-bottom:6px;font-weight:600}
.tsnd-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.tsnd-lbl{font-size:11px;color:var(--txt3)}
.tsnd-tog{width:40px;height:22px;background:var(--bg3);border-radius:11px;cursor:pointer;position:relative;border:1px solid var(--brd2);transition:background .2s;flex-shrink:0}
.tsnd-tog.on{background:var(--green)}
.tsnd-tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tsnd-tog.on::after{left:20px}
.tring{width:130px;height:130px;margin:0 auto 16px;position:relative}
.tring svg{position:absolute;top:0;left:0;width:130px;height:130px;transform:rotate(-90deg)}
.tring circle{fill:none;stroke-width:3}
.tbg{stroke:rgba(255,255,255,.05)}
.tarc{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.tinn{position:absolute;top:0;left:0;width:130px;height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tnum{font-size:38px;font-weight:700;color:var(--txt)}
.tunit{font-size:10px;color:var(--txt3);margin-top:-3px}
.tmsg{font-size:12px;color:var(--txt2);margin-bottom:14px}
.tskip{padding:10px 22px;background:var(--bg3);border:1px solid var(--brd2);border-radius:var(--rp);font-size:13px;color:var(--txt2);cursor:pointer;-webkit-appearance:none;outline:none}
.rh{background:linear-gradient(145deg,#0f0f1a,#1a1a3e);padding:24px 18px 18px;text-align:center}
.rcheck{font-size:44px;margin-bottom:6px}
.rtitle{font-size:18px;font-weight:700;color:#fff}
.rsub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.rbody{padding:14px}
.rbox{background:var(--bg2);border-radius:var(--r);padding:12px;font-size:11px;line-height:1.9;color:var(--txt2);white-space:pre-wrap;border:1px solid var(--brd);font-family:monospace;max-height:38vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cmsg{text-align:center;font-size:12px;color:var(--green);margin-top:6px;height:20px;font-weight:600}
.tc{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tt{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:10px}
.ts{display:flex;gap:8px;margin-bottom:10px}
.tsb{flex:1;background:var(--bg3);border-radius:var(--rs);padding:8px;text-align:center}
.tsv{font-size:17px;font-weight:700;color:var(--gold)}
.tsl{font-size:10px;color:var(--txt3);margin-top:2px}
.ter{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:12px}
.ter:last-child{border-bottom:none}
.ten{color:var(--txt2);flex:1}
.tev{color:var(--txt);font-weight:600;margin-left:8px}
/* INFO BLOCK */
.info-section{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.info-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;font-weight:700;color:var(--gold);min-width:70px;flex-shrink:0}
.info-val{font-size:12px;color:var(--txt2);line-height:1.5;flex:1}
.info-example{font-size:11px;color:var(--txt3);margin-top:3px}
</style>
</head>

function iDay(day){
  if(S.d[day])return;
  var ex=EX[day]||[];
  var o={feel:'',pain:'Немає',note:'',sets:{},w:{},reps:{}};
  ex.forEach(function(e,i){o.sets[i]=[];for(var s=0;s<e.s;s++)o.sets[i].push('');o.w[i]=e.dw;o.reps[i]=e.r;});

var tI=null,tTot=90,tLeft=90,CIRC=2*Math.PI*60;

function playBeep(){
  if(!soundOn)return;
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;
    gain.gain.setValueAtTime(0.4,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
    setTimeout(function(){
      var osc2=ctx.createOscillator();var gain2=ctx.createGain();
      osc2.connect(gain2);gain2.connect(ctx.destination);
      osc2.frequency.value=1100;
      gain2.gain.setValueAtTime(0.4,ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
      osc2.start(ctx.currentTime);osc2.stop(ctx.currentTime+0.6);
    },400);
  }catch(e){}
}

function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('snd-tog').classList.toggle('on',soundOn);
}

function startT(secs,name){
  tTot=secs;tLeft=secs;
  document.getElementById('tex').textContent=name;
  document.getElementById('tov').style.display='flex';
  document.getElementById('snd-tog').classList.toggle('on',soundOn);
  updT();
  if(tI)clearInterval(tI);
  tI=setInterval(function(){
    tLeft--;updT();
    if(tLeft<=0){
      clearInterval(tI);
      document.getElementById('tnum').textContent='✓';
      document.getElementById('tmsg').textContent='Готово! Наступний підхід 🔥';
      playBeep();
      try{if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);}catch(e){}
      setTimeout(function(){document.getElementById('tov').style.display='none';},2000);
    }
  },1000);
}

function updT(){
  document.getElementById('tnum').textContent=tLeft;
  var off=CIRC-(CIRC*(tLeft/tTot));
  document.getElementById('tarc').style.strokeDashoffset=off;
  document.getElementById('tmsg').textContent=tLeft>tTot*.6?'Відпочивай 💪':tLeft>tTot*.3?'Майже готова! 🔥':'Ще трохи...';
}

function tapS(day,i,s,rs,name){
  var d=S.d[day];
  var cur=d.sets[i][s];
  var nxt=cur===''?'done':cur==='done'?'fail':'';
  d.sets[i][s]=nxt;
  var btn=document.getElementById('sb-'+day+'-'+i+'-'+s);
  if(btn)btn.className='sb'+(nxt==='done'?' done':nxt==='fail'?' fail':'');
  var all=d.sets[i].every(function(x){return x==='done';});
  var bl=document.getElementById('exb-'+day+'-'+i);
  if(bl)bl.classList.toggle('xdone',all);
  save();
  if(nxt==='done'&&rs>0)startT(rs,name);
  try{if(navigator.vibrate)navigator.vibrate(nxt==='done'?[40]:nxt==='fail'?[80,40,80]:[20]);}catch(e){}
}

function chV(tp,day,i,delta){
  var d=S.d[day];
  if(tp==='w'){d.w[i]=Math.max(0,Math.round((d.w[i]+delta)*2)/2);var el=document.getElementById('wv-'+day+'-'+i);if(el)el.textContent=d.w[i];}
  else{var c=typeof d.reps[i]==='number'?d.reps[i]:(parseFloat(d.reps[i])||1);d.reps[i]=Math.max(1,c+delta);var el2=document.getElementById('rv-'+day+'-'+i);if(el2)el2.textContent=d.reps[i];}
  save();
}

function doCopy(){
  var txt=document.getElementById('rtxt').textContent;
  var msg=document.getElementById('cmsg');
  function ok(){msg.textContent='✅ Скопійовано!';setTimeout(function(){msg.textContent='';},2500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok).catch(function(){fb2(txt,ok);});}else fb2(txt,ok);
}
function fb2(txt,cb){var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0;top:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);cb();}

function goBack(){
  var d=S.rt==='week'?'week':S.rt==='info'?'info':S.cur;
  var idx={tue:0,thu:1,fri:2,sun:3,week:4,info:5}[d]||0;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',i===idx);});
  if(d==='week')rWeek();else if(d==='info')rInfo();else rDay(d);
}

function rTrainer(){
  var days=['tue','thu','fri','sun'];
  var h='<div class="lbl">Панель тренера — Тиждень '+W+'</div>';
  days.forEach(function(day){
    iDay(day);
    var d=S.d[day],ex=EX[day]||[],dn=DN[day];
    var tot=0,done=0;
    ex.forEach(function(e,i){if(d.sets[i])d.sets[i].forEach(function(s){tot++;if(s==='done')done++;});});
    var pct=tot>0?Math.round(done/tot*100):0;
    h+='<div class="tc"><div class="tt">'+dn.ic+' '+dn.ua+'</div>';
    h+='<div class="ts"><div class="tsb"><div class="tsv">'+pct+'%</div><div class="tsl">Виконання</div></div>';
    h+='<div class="tsb"><div class="tsv">'+(d.feel?d.feel.split(' ')[0]:'—')+'</div><div class="tsl">Самопочуття</div></div>';
    h+='<div class="tsb"><div class="tsv">'+done+'/'+tot+'</div><div class="tsl">Підходів</div></div></div>';
    ex.forEach(function(e,i){
      if(!e.hw)return;
      var dn2=d.sets[i]?d.sets[i].filter(function(s){return s==='done';}).length:0;
      h+='<div class="ter"><span class="ten">'+e.ua+'</span><span class="tev">'+d.w[i]+' кг · '+dn2+'/'+e.s+'</span></div>';
    });
    if(d.pain&&d.pain!=='Немає')h+='<div style="margin-top:8px;font-size:12px;color:var(--red)">Біль: '+d.pain+'</div>';
    if(d.note)h+='<div style="margin-top:6px;font-size:12px;color:var(--txt2)">'+d.note+'</div>';
    h+='</div>';
  });
  h+='<button class="btn-g" onclick="genW()">Тижневий звіт</button>';
  document.getElementById('main').innerHTML=h;
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
load();rDay('tue');
</script>
